name: next-loop-controller

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    name: approval-bounded next loop
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Run approval-bounded next-loop controller
        run: python scripts/next_loop_controller.py --check --skip-npm-ci
